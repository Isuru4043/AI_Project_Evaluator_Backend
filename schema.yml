openapi: 3.0.3
info:
  title: AI Project Evaluator — Viva Module API
  version: 1.0.0
  description: API for student and examiner interactions in the Viva Evaluation system.
paths:
  /api/auth/examiner/register/:
    post:
      operationId: auth_examiner_register_create
      description: |-
        POST /api/auth/examiner/register/

        Register a new examiner account. Creates both the User
        (with role='examiner') and the linked ExaminerProfile.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/login/:
    post:
      operationId: auth_login_create
      description: |-
        POST /api/auth/login/

        Authenticate a user (examiner or student) and return
        JWT access + refresh tokens along with basic user info.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/logout/:
    post:
      operationId: auth_logout_create
      description: |-
        POST /api/auth/logout/

        Blacklist the provided refresh token so it can no longer
        be used to obtain new access tokens.
        Requires: Bearer <access_token> in the Authorization header.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/me/:
    get:
      operationId: auth_me_retrieve
      description: |-
        GET /api/auth/me/

        Return the authenticated user's info together with their
        role-specific profile (ExaminerProfile or StudentProfile).
        Requires: Bearer <access_token> in the Authorization header.
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/student/register/:
    post:
      operationId: auth_student_register_create
      description: |-
        POST /api/auth/student/register/

        Register a new student account. Creates both the User
        (with role='student') and the linked StudentProfile.
      tags:
      - auth
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/auth/token/refresh/:
    post:
      operationId: auth_token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
