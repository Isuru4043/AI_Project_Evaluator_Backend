  /api/viva/sessions/start/:
    post:
      operationId: viva_sessions_start_create
      description: |-
        POST /api/viva/sessions/start/

        Starts a viva session for a submission.
        Generates and returns the first question for the first rubric criterion.

        Request body:
        {
            "session_id": "uuid-of-evaluation-session"
        }
      tags:
      - viva
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/viva/students/:
    get:
      operationId: viva_students_retrieve
      description: |-
        GET /api/viva/students/

        Returns all students. Used by examiner when creating a session.
      tags:
      - viva
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/viva/submissions/{submission_id}/status/:
    get:
      operationId: viva_submissions_status_retrieve
      description: |-
        GET /api/viva/submissions/<submission_id>/status/

        Returns the current processing status of a submission.
        Frontend checks this before allowing a session to start.
      parameters:
      - in: path
        name: submission_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - viva
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
  /api/viva/submissions/upload/:
    post:
      operationId: viva_submissions_upload_create
      description: |-
        POST /api/viva/submissions/upload/

        Handles report upload for both students and examiners.
        - Student logged in: auto-attaches their profile, only needs project + file
        - Examiner logged in: requires student UUID in request body
      tags:
      - viva
      security:
      - jwtAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
      - access
      - refresh
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
